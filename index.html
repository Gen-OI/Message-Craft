<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0f0f1a" />
  <meta name="description" content="MessageCraft — Compose messages in Hindi, Hinglish & Indian languages with tone control. Share directly to WhatsApp, Telegram & Instagram." />
  <title>MessageCraft — Hindi Message Composer</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ===== DESIGN TOKENS ===== */
    :root {
      --saffron:       #FF9933;
      --saffron-glow:  #FF6B00;
      --violet:        #7C3AED;
      --violet-light:  #A855F7;
      --green-india:   #138808;
      --green-light:   #22C55E;
      --bg-base:       #0A0A14;
      --bg-card:       rgba(255,255,255,0.04);
      --bg-card-hover: rgba(255,255,255,0.07);
      --border:        rgba(255,255,255,0.08);
      --border-glow:   rgba(255,153,51,0.3);
      --text-primary:  #F1F0F0;
      --text-secondary:#9CA3AF;
      --text-muted:    #6B7280;
      --whatsapp:      #25D366;
      --telegram:      #2AABEE;
      --instagram:     #E1306C;
      --radius-sm:     10px;
      --radius-md:     16px;
      --radius-lg:     24px;
      --radius-xl:     32px;
      --shadow-card:   0 8px 32px rgba(0,0,0,0.4);
      --shadow-glow:   0 0 40px rgba(255,153,51,0.15);
      --transition:    all 0.3s cubic-bezier(0.4,0,0.2,1);
    }

    /* ===== RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: 'Inter', 'Noto Sans Devanagari', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100dvh;
      overflow-x: hidden;
      position: relative;
    }

    /* ===== BACKGROUND ===== */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(255,153,51,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(124,58,237,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(19,136,8,0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ===== LAYOUT ===== */
    .app-wrapper {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
      padding-bottom: 80px;
    }

    /* ===== HEADER ===== */
    .header {
      padding: 20px 20px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,20,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .header-logo {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--saffron), var(--violet));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 0 20px rgba(255,153,51,0.3);
    }

    .header-text { flex: 1; }
    .header-title {
      font-size: 1.1rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--saffron), var(--violet-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }
    .header-subtitle {
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    .header-actions { display: flex; gap: 8px; }
    .icon-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 16px;
      transition: var(--transition);
    }
    .icon-btn:hover, .icon-btn.active {
      background: var(--bg-card-hover);
      border-color: var(--border-glow);
      color: var(--saffron);
    }

    /* ===== MAIN CONTENT ===== */
    .main { padding: 20px; display: flex; flex-direction: column; gap: 20px; }

    /* ===== SECTION HEADING ===== */
    .section-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    /* ===== CARD ===== */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
      transition: var(--transition);
    }

    /* ===== LANGUAGE SELECTOR ===== */
    .lang-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .lang-btn {
      padding: 10px 4px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.72rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      text-align: center;
      font-family: inherit;
    }
    .lang-btn:hover { background: var(--bg-card-hover); border-color: var(--border-glow); color: var(--text-primary); }
    .lang-btn.active {
      background: linear-gradient(135deg, rgba(255,153,51,0.2), rgba(124,58,237,0.2));
      border-color: var(--saffron);
      color: var(--saffron);
      font-weight: 600;
    }
    .lang-icon { font-size: 1.1rem; display: block; margin-bottom: 2px; }

    /* ===== TEXTAREA ===== */
    .input-area {
      position: relative;
    }
    .msg-textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-family: 'Inter', 'Noto Sans Devanagari', sans-serif;
      font-size: 0.95rem;
      line-height: 1.6;
      resize: none;
      min-height: 120px;
      padding: 0;
    }
    .msg-textarea::placeholder { color: var(--text-muted); }

    .input-tools {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .char-count { font-size: 0.72rem; color: var(--text-muted); }
    .voice-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.75rem;
      cursor: pointer;
      font-family: inherit;
      transition: var(--transition);
    }
    .voice-btn:hover { border-color: var(--saffron); color: var(--saffron); }
    .voice-btn.recording {
      border-color: #ef4444;
      color: #ef4444;
      animation: pulse-border 1s infinite;
    }
    @keyframes pulse-border {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
      50% { box-shadow: 0 0 0 6px rgba(239,68,68,0); }
    }

    /* ===== TONE SELECTOR ===== */
    .tone-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .tone-btn {
      padding: 14px 8px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      text-align: center;
      font-family: inherit;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }
    .tone-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: var(--transition);
    }
    .tone-btn.professional::before { background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(99,102,241,0.15)); }
    .tone-btn.friendly::before { background: linear-gradient(135deg, rgba(34,197,94,0.15), rgba(20,184,166,0.15)); }
    .tone-btn.strict::before { background: linear-gradient(135deg, rgba(239,68,68,0.15), rgba(249,115,22,0.15)); }

    .tone-btn:hover::before, .tone-btn.active::before { opacity: 1; }

    .tone-btn.active.professional { border-color: #3B82F6; }
    .tone-btn.active.friendly { border-color: #22C55E; }
    .tone-btn.active.strict { border-color: #EF4444; }

    .tone-emoji { font-size: 1.5rem; display: block; margin-bottom: 4px; }
    .tone-name { font-size: 0.78rem; font-weight: 600; display: block; }
    .tone-desc { font-size: 0.65rem; color: var(--text-muted); display: block; margin-top: 2px; }

    .tone-btn.active .tone-name { color: var(--text-primary); }
    .tone-btn.active.professional .tone-name { color: #60A5FA; }
    .tone-btn.active.friendly .tone-name { color: #4ADE80; }
    .tone-btn.active.strict .tone-name { color: #F87171; }

    /* ===== GENERATE BUTTON ===== */
    .generate-btn {
      width: 100%;
      padding: 16px;
      border-radius: var(--radius-md);
      border: none;
      background: linear-gradient(135deg, var(--saffron-glow), var(--saffron), var(--violet-light));
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(255,153,51,0.3);
      letter-spacing: 0.02em;
    }
    .generate-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent, rgba(255,255,255,0.1), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }
    .generate-btn:hover::after { transform: translateX(100%); }
    .generate-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 32px rgba(255,153,51,0.4); }
    .generate-btn:active { transform: translateY(0); }
    .generate-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .generate-btn .btn-inner { display: flex; align-items: center; justify-content: center; gap: 8px; }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    .generating .spinner { display: block; }
    .generating .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }



    /* ===== OUTPUT CARD ===== */
    .output-card {
      display: none;
      background: linear-gradient(135deg, rgba(255,153,51,0.06), rgba(124,58,237,0.06));
      border: 1px solid var(--border-glow);
      border-radius: var(--radius-md);
      overflow: hidden;
      animation: slideUp 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    .output-card.visible { display: block; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .output-header {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: rgba(255,153,51,0.05);
    }
    .output-badge {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--saffron);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .output-badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--saffron);
      box-shadow: 0 0 6px var(--saffron);
    }
    .output-actions { display: flex; gap: 6px; }
    .small-btn {
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.72rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: var(--transition);
      display: flex; align-items: center; gap: 4px;
    }
    .small-btn:hover { background: var(--bg-card-hover); border-color: var(--border-glow); color: var(--text-primary); }
    .small-btn.copied { border-color: var(--green-light); color: var(--green-light); }

    .output-body { padding: 16px; }
    .output-text {
      font-family: 'Noto Sans Devanagari', 'Inter', sans-serif;
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--text-primary);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .output-text.editable {
      outline: none;
      border-bottom: 2px solid var(--saffron);
      padding-bottom: 4px;
    }

    .output-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-top: 1px solid var(--border);
    }
    .output-meta-info { font-size: 0.7rem; color: var(--text-muted); }
    .save-template-btn {
      font-size: 0.72rem;
      background: none;
      border: none;
      color: var(--violet-light);
      cursor: pointer;
      font-family: inherit;
      display: flex; align-items: center; gap: 4px;
      padding: 4px 8px;
      border-radius: 6px;
      transition: var(--transition);
    }
    .save-template-btn:hover { background: rgba(168,85,247,0.1); }

    /* ===== SHARE BUTTONS ===== */
    .share-section { }
    .share-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .share-btn {
      padding: 14px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      background: var(--bg-card);
      color: var(--text-primary);
      cursor: pointer;
      font-family: inherit;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      position: relative;
      overflow: hidden;
    }
    .share-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: var(--transition);
    }
    .share-btn:hover::before { opacity: 1; }
    .share-btn:hover { transform: translateY(-2px); }

    .share-btn.whatsapp { border-color: rgba(37,211,102,0.3); }
    .share-btn.whatsapp::before { background: rgba(37,211,102,0.08); }
    .share-btn.whatsapp:hover { border-color: var(--whatsapp); box-shadow: 0 4px 20px rgba(37,211,102,0.2); }
    .share-btn.whatsapp .share-icon { color: var(--whatsapp); }

    .share-btn.telegram { border-color: rgba(42,171,238,0.3); }
    .share-btn.telegram::before { background: rgba(42,171,238,0.08); }
    .share-btn.telegram:hover { border-color: var(--telegram); box-shadow: 0 4px 20px rgba(42,171,238,0.2); }
    .share-btn.telegram .share-icon { color: var(--telegram); }

    .share-btn.instagram { border-color: rgba(225,48,108,0.3); }
    .share-btn.instagram::before { background: rgba(225,48,108,0.08); }
    .share-btn.instagram:hover { border-color: var(--instagram); box-shadow: 0 4px 20px rgba(225,48,108,0.2); }
    .share-btn.instagram .share-icon { color: var(--instagram); }

    .share-btn.native { border-color: rgba(124,58,237,0.3); }
    .share-btn.native::before { background: rgba(124,58,237,0.08); }
    .share-btn.native:hover { border-color: var(--violet-light); box-shadow: 0 4px 20px rgba(124,58,237,0.2); }
    .share-btn.native .share-icon { color: var(--violet-light); }

    .share-icon { font-size: 1.3rem; flex-shrink: 0; position: relative; z-index: 1; }
    .share-text-wrap { position: relative; z-index: 1; }
    .share-name { display: block; }
    .share-sub { font-size: 0.65rem; color: var(--text-muted); font-weight: 400; }

    /* ===== TEMPLATES ===== */
    .templates-chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }
    .templates-chips::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0;
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 0.75rem;
      cursor: pointer;
      font-family: inherit;
      transition: var(--transition);
      display: flex; align-items: center; gap: 6px;
    }
    .chip:hover { border-color: var(--border-glow); color: var(--text-primary); background: var(--bg-card-hover); }

    /* ===== HISTORY DRAWER ===== */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: all; }

    .drawer {
      position: fixed;
      bottom: 0; left: 50%; 
      transform: translateX(-50%) translateY(100%);
      width: 100%;
      max-width: 480px;
      max-height: 70vh;
      background: #111122;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      border-top: 1px solid var(--border);
      z-index: 300;
      transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
      display: flex;
      flex-direction: column;
    }
    .drawer.open { transform: translateX(-50%) translateY(0); }

    .drawer-handle {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 12px auto 0;
    }
    .drawer-header {
      padding: 16px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .drawer-title { font-size: 1rem; font-weight: 600; }
    .drawer-close {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 14px;
    }
    .drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .history-item {
      padding: 12px;
      border-radius: var(--radius-sm);
      background: var(--bg-card);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: var(--transition);
    }
    .history-item:hover { background: var(--bg-card-hover); border-color: var(--border-glow); }
    .history-item-text {
      font-size: 0.82rem;
      color: var(--text-primary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .history-item-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.68rem;
      color: var(--text-muted);
    }
    .history-badge {
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.62rem;
      font-weight: 600;
    }
    .history-badge.professional { background: rgba(59,130,246,0.15); color: #60A5FA; }
    .history-badge.friendly { background: rgba(34,197,94,0.15); color: #4ADE80; }
    .history-badge.strict { background: rgba(239,68,68,0.15); color: #F87171; }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    .empty-state-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty-state-text { font-size: 0.85rem; }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1E1E30;
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 0.82rem;
      z-index: 400;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===== BOTTOM NAV ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: rgba(10,10,20,0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      padding: 8px 20px 16px;
      display: flex;
      justify-content: space-around;
      z-index: 100;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      padding: 6px 16px;
      border-radius: 12px;
      transition: var(--transition);
      background: none;
      border: none;
      font-family: inherit;
    }
    .nav-item:hover, .nav-item.active { background: rgba(255,153,51,0.08); }
    .nav-icon { font-size: 1.2rem; }
    .nav-label { font-size: 0.6rem; color: var(--text-muted); transition: var(--transition); }
    .nav-item.active .nav-label, .nav-item:hover .nav-label { color: var(--saffron); }

    /* ===== INSTAl BANNER ===== */
    .install-banner {
      display: none;
      margin: 0 20px;
      padding: 12px 16px;
      background: linear-gradient(135deg, rgba(255,153,51,0.1), rgba(124,58,237,0.1));

  </style>

<script>
// ===== STATE =====
let selectedLang = 'hinglish';
let selectedTone = 'professional';
let generatedText = '';
let recognition = null;
let isRecording = false;
let deferredInstallPrompt = null;
let isEditing = false;

// ===== LOCAL STORAGE HELPERS =====
const LS = {
  get: (k, def) => { try { return JSON.parse(localStorage.getItem(k)) ?? def; } catch { return def; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
};

// ===== ELEMENTS =====
const $  = id => document.getElementById(id);
const msgInput    = $('msgInput');
const charCount   = $('charCount');
const generateBtn = $('generateBtn');
const outputCard  = $('outputCard');
const outputText  = $('outputText');
const outputMeta  = $('outputMeta');
const outputBadge = $('outputBadge');
const shareSection= $('shareSection');
const toast       = $('toast');

// ===== INIT =====
function init() {
  // Restore preferences
  selectedLang = LS.get('lang', 'hinglish');
  selectedTone = LS.get('tone', 'professional');
  setLang(selectedLang);
  setTone(selectedTone);

  // Dark mode
  if (LS.get('lightMode', false)) toggleTheme(true);

  setupEvents();
  setupVoice();
  setupPWA();
}

// ===== LANGUAGE =====
function setLang(lang) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  const btn = $(`lang-${lang}`);
  if (btn) btn.classList.add('active');
  selectedLang = lang;
  LS.set('lang', lang);
}

// ===== TONE =====
function setTone(tone) {
  document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active'));
  const btn = $(`tone-${tone}`);
  if (btn) btn.classList.add('active');
  selectedTone = tone;
  LS.set('tone', tone);
}

// ===== EVENTS =====
function setupEvents() {
  // Language buttons
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => setLang(btn.dataset.lang));
  });

  // Tone buttons
  document.querySelectorAll('.tone-btn').forEach(btn => {
    btn.addEventListener('click', () => setTone(btn.dataset.tone));
  });

  // Char count
  msgInput.addEventListener('input', () => {
    charCount.textContent = `${msgInput.value.length} / 2000`;
  });

  // Generate
  generateBtn.addEventListener('click', generateMessage);

  // Copy button
  $('copyBtn').addEventListener('click', copyOutput);

  // Edit button
  $('editBtn').addEventListener('click', toggleEdit);

  // Share buttons
  $('shareWhatsApp').addEventListener('click', () => shareTo('whatsapp'));
  $('shareTelegram').addEventListener('click', () => shareTo('telegram'));
  $('shareInstagram').addEventListener('click', () => shareTo('instagram'));
  $('shareNative').addEventListener('click', () => shareNative());

  // Templates
  document.querySelectorAll('[data-template]').forEach(chip => {
    chip.addEventListener('click', () => loadTemplate(chip.dataset.template));
  });

  // Save template
  $('saveTemplateBtn').addEventListener('click', saveAsTemplate);

  // History
  $('openHistory').addEventListener('click', openDrawer);
  $('navHistory').addEventListener('click', openDrawer);
  $('closeDrawer').addEventListener('click', closeDrawer);
  $('drawerOverlay').addEventListener('click', closeDrawer);

  // Theme toggle
  $('toggleTheme').addEventListener('click', () => toggleTheme());

  // Nav
  $('navCompose').addEventListener('click', () => {
    document.querySelector('.main').scrollTo({ top: 0, behavior: 'smooth' });
  });
  $('navTemplates').addEventListener('click', () => {
    document.querySelector('.templates-chips').scrollIntoView({ behavior: 'smooth' });
  });
}

// ===== TEMPLATES =====
const TEMPLATES = {
  birthday: "Happy birthday! Aapko bahut bahut shubhkamnayen. Aaj aapka din bahut special ho.",
  meeting: "Kal subah 10 baje meeting hai. Please time pe aa jana aur sab documents ready rakhna.",
  thanks: "Aapka bahut shukriya. Aapki madad ke bina yeh possible nahi hota.",
  followup: "Maine pichli baar contact kiya tha. Kya aap update de sakte hain?",
  apology: "Mujhe bahut dukh hai jo hua. Main genuinely sorry hun aur is galti ko sudharna chahta hun.",
  invitation: "Aap sabko hamare ghar ek choti si party mein bulana chahte hain. Please zaroor aa na!"
};

function loadTemplate(key) {
  const text = TEMPLATES[key];
  if (text) {
    msgInput.value = text;
    charCount.textContent = `${text.length} / 2000`;
    showToast('📝 Template loaded!');
    msgInput.focus();
  }
}

function saveAsTemplate() {
  if (!generatedText) { showToast('❌ No message to save'); return; }
  const templates = LS.get('savedTemplates', []);
  const entry = { text: generatedText, tone: selectedTone, lang: selectedLang, date: Date.now() };
  templates.unshift(entry);
  LS.set('savedTemplates', templates.slice(0, 20));
  showToast('⭐ Saved as template!');
}

// ===== VOICE INPUT =====
function setupVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    $('voiceBtn').style.display = 'none';
    return;
  }
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = selectedLang === 'hindi' ? 'hi-IN' : 'hi-IN';

  recognition.onresult = (e) => {
    const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
    msgInput.value = transcript;
    charCount.textContent = `${transcript.length} / 2000`;
  };
  recognition.onend = () => stopRecording();
  recognition.onerror = () => { stopRecording(); showToast('🎤 Voice error. Try again.'); };

  $('voiceBtn').addEventListener('click', toggleVoice);
}

function toggleVoice() {
  if (!recognition) return;
  if (isRecording) {
    recognition.stop();
  } else {
    try {
      recognition.lang = selectedLang === 'hindi' ? 'hi-IN' : 'hi-IN';
      recognition.start();
      isRecording = true;
      $('voiceBtn').classList.add('recording');
      $('voiceIcon').textContent = '🔴';
      $('voiceText').textContent = 'Recording…';
    } catch(e) {}
  }
}

function stopRecording() {
  isRecording = false;
  $('voiceBtn').classList.remove('recording');
  $('voiceIcon').textContent = '🎤';
  $('voiceText').textContent = 'Voice Input';
}

// ===== GENERATE =====
async function generateMessage() {
  const msg = msgInput.value.trim();
  if (!msg) { showToast('⚠️ Please type your message first'); return; }

  setGenerating(true);

  const langLabels = { hindi: 'Hindi (pure Devanagari script)', hinglish: 'Hinglish (mix of Hindi and English)', english: 'Indian English', auto: 'auto-detect the language and respond accordingly' };
  const tonePrompts = {
    professional: 'formal, polite, and professional — suitable for work, official communication, or business contexts. Use respectful language.',
    friendly: 'warm, casual, and friendly — use conversational phrases, feel free to add relevant emojis, and keep it personal.',
    strict: 'direct, firm, and no-nonsense — get straight to the point, no pleasantries, authoritative tone.'
  };

  const prompt = `You are a message composing assistant for Indian users. Transform the user's raw message into a well-composed message.

User's raw message: "${msg}"
Target language: ${langLabels[selectedLang]}
Tone: ${tonePrompts[selectedTone]}

Instructions:
- Rewrite the message in the selected language with the selected tone
- Keep the core meaning intact
- Make it natural and fluent
- For Hinglish, blend Hindi and English naturally as Indians speak
- For Hindi, use Devanagari script
- Do NOT add any explanation or prefix — output ONLY the final message
- Keep emojis minimal and appropriate to tone (many for Friendly, none for Strict, 1-2 for Professional)

Output only the transformed message:`;

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'google/gemini-2.0-flash-001',
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err?.error?.message || err?.error || 'API Error');
    }
    const data = await res.json();
    const text = data?.choices?.[0]?.message?.content?.trim();
    if (!text) throw new Error('Empty response from AI');

    generatedText = text;
    showOutput(text);
    saveToHistory(msg, text);

  } catch(e) {
    showToast(`❌ ${e.message}`);
  } finally {
    setGenerating(false);
  }
}

function setGenerating(on) {
  generateBtn.disabled = on;
  generateBtn.classList.toggle('generating', on);
}

function showOutput(text) {
  outputText.textContent = text;
  outputText.contentEditable = 'false';
  isEditing = false;
  $('editBtn').textContent = '✏️ Edit';
  outputMeta.textContent = `${text.length} chars · ${selectedLang.charAt(0).toUpperCase()+selectedLang.slice(1)} · ${selectedTone.charAt(0).toUpperCase()+selectedTone.slice(1)}`;
  outputBadge.innerHTML = `<span style="margin-right:4px">✨</span> AI Generated`;
  outputCard.classList.add('visible');
  shareSection.style.display = 'block';
  outputCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ===== COPY & EDIT =====
function copyOutput() {
  const text = outputText.textContent;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    $('copyBtn').classList.add('copied');
    $('copyBtn').textContent = '✅ Copied!';
    showToast('📋 Copied to clipboard!');
    setTimeout(() => {
      $('copyBtn').classList.remove('copied');
      $('copyBtn').textContent = '📋 Copy';
    }, 2000);
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    showToast('📋 Copied!');
  });
}

function toggleEdit() {
  isEditing = !isEditing;
  if (isEditing) {
    outputText.contentEditable = 'true';
    outputText.classList.add('editable');
    outputText.focus();
    $('editBtn').textContent = '✅ Done';
  } else {
    generatedText = outputText.textContent;
    outputText.contentEditable = 'false';
    outputText.classList.remove('editable');
    $('editBtn').textContent = '✏️ Edit';
    outputMeta.textContent = `${generatedText.length} chars · ${selectedLang} · ${selectedTone} (edited)`;
  }
}

// ===== SHARE =====
function shareTo(platform) {
  const text = outputText.textContent;
  if (!text) { showToast('⚠️ Generate a message first'); return; }
  const encodedText = encodeURIComponent(text);
  const urls = {
    whatsapp: `https://wa.me/?text=${encodedText}`,
    telegram: `https://t.me/share/url?url=&text=${encodedText}`,
    instagram: null
  };
  if (platform === 'instagram') {
    navigator.clipboard.writeText(text).then(() => {
      showToast('📋 Copied! Opening Instagram…');
      setTimeout(() => { window.open('https://www.instagram.com/direct/inbox/', '_blank'); }, 800);
    });
    return;
  }
  window.open(urls[platform], '_blank');
}

async function shareNative() {
  const text = outputText.textContent;
  if (!text) { showToast('⚠️ Generate a message first'); return; }
  if (navigator.share) {
    try {
      await navigator.share({ text });
    } catch(e) {}
  } else {
    copyOutput();
    showToast('📋 Copied! Paste anywhere to share.');
  }
}

// ===== HISTORY =====
function saveToHistory(input, output) {
  const history = LS.get('msgHistory', []);
  history.unshift({ input, output, tone: selectedTone, lang: selectedLang, date: Date.now() });
  LS.set('msgHistory', history.slice(0, 50));
}

function openDrawer() {
  const history = LS.get('msgHistory', []);
  const body = $('drawerBody');
  body.innerHTML = '';

  if (history.length === 0) {
    body.innerHTML = `<div class="empty-state">
      <div class="empty-state-icon">💬</div>
      <div class="empty-state-text">No messages yet.<br>Generate your first message!</div>
    </div>`;
  } else {
    history.forEach((item, i) => {
      const el = document.createElement('div');
      el.className = 'history-item';
      const date = new Date(item.date);
      const dateStr = date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }) + ' ' + date.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
      el.innerHTML = `
        <div class="history-item-text">${escHtml(item.output)}</div>
        <div class="history-item-meta">
          <span class="history-badge ${item.tone}">${item.tone}</span>
          <span>${item.lang}</span>
          <span>${dateStr}</span>
        </div>`;
      el.addEventListener('click', () => {
        msgInput.value = item.input;
        charCount.textContent = `${item.input.length} / 2000`;
        setLang(item.lang);
        setTone(item.tone);
        generatedText = item.output;
        showOutput(item.output);
        closeDrawer();
        showToast('✅ Message restored!');
      });
      body.appendChild(el);
    });
  }

  $('drawerOverlay').classList.add('open');
  $('historyDrawer').classList.add('open');
}

function closeDrawer() {
  $('drawerOverlay').classList.remove('open');
  $('historyDrawer').classList.remove('open');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== THEME =====
function toggleTheme(forceLight) {
  const isLight = forceLight ?? !document.documentElement.classList.contains('light-mode');
  document.documentElement.classList.toggle('light-mode', isLight);
  $('toggleTheme').textContent = isLight ? '☀️' : '🌙';
  LS.set('lightMode', isLight);
}

// ===== TOAST =====
let toastTimer;
function showToast(msg) {
  toast.innerHTML = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
}

// ===== PWA =====
function setupPWA() {
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredInstallPrompt = e;
    $('installBanner').classList.add('show');
  });

  $('installBtn').addEventListener('click', async () => {
    if (deferredInstallPrompt) {
      deferredInstallPrompt.prompt();
      const result = await deferredInstallPrompt.userChoice;
      if (result.outcome === 'accepted') {
        $('installBanner').classList.remove('show');
        showToast('🎉 MessageCraft installed!');
      }
      deferredInstallPrompt = null;
    }
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
}

// ===== START =====
init();
</script>
